kind = "web"
previewPath = "/"
title = "Calculadora de IMC"
version = "1.0.0"
id = "artifacts/calculadora-imc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21143

[services.development]
run = "pnpm --filter @workspace/calculadora-imc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calculadora-imc", "run", "build" ]
publicDir = "artifacts/calculadora-imc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21143"
BASE_PATH = "/"
